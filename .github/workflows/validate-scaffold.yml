name: Validate scaffold

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  plugin:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install harness (plugin)
        run: |
          mkdir -p /tmp/harness-test
          python mini-harness/scripts/mini_harness.py install --root /tmp/harness-test

      - name: Verify required files
        run: |
          test -f /tmp/harness-test/harness/skills/using-harness/SKILL.md
          ! test -f /tmp/harness-test/harness/skills/goal-md/SKILL.md
          test -f /tmp/harness-test/harness/profile/PROJECT.md
          test -f /tmp/harness-test/harness/profile/evolution.jsonl
          ! test -f /tmp/harness-test/AGENTS.md
          test -f /tmp/harness-test/harness/index.md
          ! test -d /tmp/harness-test/harness/goal
          test -f /tmp/harness-test/harness/PROGRESS.md
          test -f /tmp/harness-test/harness/todo.md
          test -f /tmp/harness-test/harness/scripts/mini_harness.py
          test -f /tmp/harness-test/harness/skills/tdd/SKILL.md
          ! test -d /tmp/harness-test/harness/rules
          test -f /tmp/harness-test/harness/docs/weekly-review.md
          test -f /tmp/harness-test/tests/README.md
          test -f /tmp/harness-test/harness/.mini-harness.json

      - name: Doctor check
        run: |
          python /tmp/harness-test/harness/scripts/mini_harness.py doctor --root /tmp/harness-test
